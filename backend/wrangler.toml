name = "red-butterfly-813e"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "chat-app-api-prod"
routes = [
  { pattern = "api.chatflow.dev/api/*", zone_name = "chatflow.dev" }
]

[env.development]
name = "chat-app-api-dev"

[env.production.vars]
JWT_SECRET = "your-production-secret-key-change-this"
ENVIRONMENT = "production"

[env.development.vars]
JWT_SECRET = "dev-secret-key"
ENVIRONMENT = "development"

[build]
command = "npm install"
cwd = "./"

[[kv_namespaces]]
binding = "CHAT_STORE"
id = "d0d61250aa1e48cb81297af554350e4b"
